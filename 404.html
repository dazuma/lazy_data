<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
  </head>
  <body>
    <p>
      <a href="https://dazuma.github.io/lazy_data/gem/latest">Main documentation page</a>
    </p>
  </body>
  <script>
    var version = "0";
    var location_updated = false;
    if (!location_updated) {
      var loc = window.location.href.replace(
        new RegExp("//dazuma\\.github\\.io/lazy_data/gem/latest(/|$)"),
        "//dazuma.github.io/lazy_data/gem/v" + version + "/");
      if (window.location.href != loc) {
        window.location.replace(loc);
        location_updated = true;
      }
    }
    if (!location_updated) {
      window.location.replace("https://dazuma.github.io/lazy_data/gem/latest");
    }
  </script>
</html>
