name: "CI"

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  CI:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            ruby: "2.7"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "3.0"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "3.1"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "3.2"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "3.3"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "3.4"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "4.0"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "jruby"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "truffleruby"
            steps: "--test"
          - os: macos-latest
            ruby: "2.7"
            steps: "--test"
          - os: macos-latest
            ruby: "4.0"
            steps: "--test"
          - os: windows-latest
            ruby: "2.7"
            steps: "--test"
          - os: windows-latest
            ruby: "4.0"
            steps: "--test"
          - os: ubuntu-latest
            ruby: "4.0"
            steps: "--rubocop --yard --build"
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Install Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler: default
          bundler-cache: true
      - name: Install toys
        shell: bash
        run: "gem install --no-document toys"
      - name: Run ${{ matrix.steps }}
        shell: bash
        run: toys ci --only ${{ matrix.steps }} < /dev/null
